services:
  linkhop:
    build: .
    container_name: linkhop-app
    # restart: unless-stopped
    # ports:
      # - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,*}
      - TIME_ZONE=${TIME_ZONE:-UTC}
      - LINKHOP_MESSAGE_RETENTION_DAYS=${LINKHOP_MESSAGE_RETENTION_DAYS:-7}
    volumes:
      - linkhop-data:/app/data
      - linkhop-static:/app/staticfiles
    networks:
      - linkhop-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    container_name: linkhop-caddy
    # restart: unless-stopped
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - linkhop-static:/var/www/static:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - CADDY_INGRESS_NETWORKS=linkhop-network
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    depends_on:
      - linkhop
    networks:
      - linkhop-network

configs:
  caddyfile:
    content: |
      {
          auto_https off
      }

      :80 {
          handle_path /static/* {
              root * /var/www/static
              file_server
              header Cache-Control "public, max-age=31536000, immutable"
          }

          handle /api/events/stream {
              reverse_proxy linkhop:8000 {
                  flush_interval -1
                  transport http {
                      read_timeout 1h
                      write_timeout 1h
                  }
              }
          }

          handle {
              reverse_proxy linkhop:8000 {
                  header_up Host {host}
                  header_up X-Real-IP {remote}
                  header_up X-Forwarded-For {remote}
                  header_up X-Forwarded-Proto {scheme}
              }
          }
      }

volumes:
  linkhop-data:
    driver: local
  linkhop-static:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  linkhop-network:
    driver: bridge

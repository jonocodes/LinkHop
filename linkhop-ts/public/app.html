<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkHop</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">LinkHop</p>
        <h1 id="page-heading">Inbox</h1>

          <a href="/account/inbox" data-route="inbox">Inbox</a>

    <script src="/pwa-register.js?v=8"></script>

    <script src="/inbox.js?v=8"></script>

{% extends "base.html" %}

{% block title %}Connect — LinkHop{% endblock %}

{% block content %}
<h1>Connect this device</h1>

<p style="color:#444;margin-bottom:1.5rem">
  Enter the 6-digit PIN from an existing device or from the admin panel.
</p>

{% if pin_error %}
<div class="alert alert-error">{{ pin_error }}</div>
{% endif %}

<form method="post" action="{% url 'connect' %}">
  {% csrf_token %}
  <input type="hidden" name="mode" value="pin">
  <div class="field">
    <label for="id_pin">Pairing PIN</label>
    <input type="text" id="id_pin" name="pin" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="123456" value="{{ pin|default:'' }}" autocomplete="one-time-code" autofocus>
  </div>
  <div class="field">
    <label for="id_device_name">Device name</label>
    <input type="text" id="id_device_name" name="device_name" value="{{ device_name|default:'' }}" placeholder="Phone Safari" autocomplete="off">
  </div>
  <button type="submit" class="btn">Pair device</button>
</form>
{% endblock %}

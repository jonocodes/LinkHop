{% extends "base.html" %}

{% block title %}Connect — LinkHop{% endblock %}

{% block content %}
<h1>Connect this device</h1>

<p style="color:#444;margin-bottom:1.5rem">
  Sign in to add this browser as a device.
</p>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<form method="post" action="{% url 'connect' %}">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ redirect_to|default:'' }}">
  <div class="field">
    <label for="id_username">Username</label>
    <input type="text" id="id_username" name="username" value="{{ username|default:'' }}" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label for="id_password">Password</label>
    <input type="password" id="id_password" name="password" autocomplete="current-password">
  </div>
  <div class="field">
    <label for="id_device_name">Device name</label>
    <input type="text" id="id_device_name" name="device_name" value="{{ device_name|default:'' }}" placeholder="Phone Safari" autocomplete="off">
  </div>
  <button type="submit" class="btn">Connect</button>
</form>
{% endblock %}

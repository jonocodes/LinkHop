{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
  <div class="module" style="max-width:480px">
    <h2 style="margin:0 0 1.25rem">Change password</h2>

    {% if success %}
    <p style="padding:0.75rem 1rem;background:#d4edda;color:#155724;border-radius:4px;margin-bottom:1.25rem">Password updated successfully.</p>
    {% endif %}

    {% if error %}
    <p style="padding:0.75rem 1rem;background:#f8d7da;color:#721c24;border-radius:4px;margin-bottom:1.25rem">{{ error }}</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:1rem">
        <label style="display:block;font-weight:600;margin-bottom:0.35rem;font-size:0.875rem">Current password</label>
        <input type="password" name="current_password" required autofocus
          style="width:100%;padding:0.45rem 0.6rem;border:1px solid var(--border-color,#ccc);border-radius:4px;font-size:0.95rem;box-sizing:border-box">
      </div>
      <div style="margin-bottom:1rem">
        <label style="display:block;font-weight:600;margin-bottom:0.35rem;font-size:0.875rem">New password</label>
        <input type="password" name="new_password" required
          style="width:100%;padding:0.45rem 0.6rem;border:1px solid var(--border-color,#ccc);border-radius:4px;font-size:0.95rem;box-sizing:border-box">
      </div>
      <div style="margin-bottom:1.5rem">
        <label style="display:block;font-weight:600;margin-bottom:0.35rem;font-size:0.875rem">Confirm new password</label>
        <input type="password" name="confirm_password" required
          style="width:100%;padding:0.45rem 0.6rem;border:1px solid var(--border-color,#ccc);border-radius:4px;font-size:0.95rem;box-sizing:border-box">
      </div>
      <button type="submit"
        style="padding:0.5rem 1.25rem;background:var(--button-bg,#417690);color:var(--button-fg,#fff);border:none;border-radius:4px;font-size:0.95rem;font-weight:600;cursor:pointer">
        Update password
      </button>
    </form>
  </div>
</div>
{% endblock %}

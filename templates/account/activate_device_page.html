{% extends "admin/base_site.html" %}

{% block content %}
{% include "account/_dark_overrides.html" %}
<div id="content-main">
  <div class="module" style="max-width:28rem">
    <h2 style="margin:0 0 0.5rem">Register this device</h2>
    <p style="margin:0 0 1.5rem;color:var(--lh-quiet)">
      Give this browser a name so you can send and receive messages on it.
    </p>

    {% if error %}
    <div style="padding:0.6rem 0.875rem;background:var(--lh-error-bg);border:1px solid var(--lh-error-border);color:var(--lh-error-fg);border-radius:4px;margin-bottom:1.25rem;font-size:0.875rem">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="{% url 'account_activate_device' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ redirect_to|default:'' }}">

      <div style="margin-bottom:1.25rem">
        <label for="id_device_name" style="display:block;font-weight:600;margin-bottom:0.25rem">Device name</label>
        <input type="text" id="id_device_name" name="device_name" value="{{ device_name|default:'' }}" placeholder="e.g. Work Laptop, Phone Safari" autocomplete="off" autofocus required
               style="display:block;width:100%;padding:0.5rem 0.625rem;border:1px solid var(--lh-border-heavy);border-radius:4px;font-size:1rem;background:var(--lh-input-bg);color:var(--lh-fg)">
      </div>

      <button type="submit" style="padding:0.5rem 1.25rem;background:var(--button-bg,#417690);color:var(--button-fg,#fff);border:none;border-radius:4px;font-size:1rem;font-weight:600;cursor:pointer">
        Register device
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% extends "admin/base_site.html" %}

{% block content %}
{% include "account/_dark_overrides.html" %}
<div id="content-main">
  <div class="module aligned" style="max-width:420px;margin:2rem auto">
    <h2 style="margin-bottom:0.25rem">Sign in</h2>
    <p style="margin:0 0 1.5rem;color:var(--lh-quiet)">LinkHop account</p>

    {% if error %}
    <p style="margin:0 0 1rem;padding:0.6rem 0.9rem;background:var(--lh-error-bg);border:1px solid var(--lh-error-border);color:var(--lh-error-fg);border-radius:4px;font-size:0.875rem">
      {{ error }}
    </p>
    {% endif %}

    <form method="post" action="{% url 'account_login' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div style="margin-bottom:1rem">
        <label for="id_username" style="display:block;font-weight:600;margin-bottom:0.3rem;font-size:0.875rem">Username</label>
        <input type="text" id="id_username" name="username" autofocus autocomplete="username"
               style="width:100%;padding:0.5rem 0.6rem;border:1px solid var(--lh-border-heavy);border-radius:4px;font-size:0.9rem;box-sizing:border-box;background:var(--lh-input-bg);color:var(--lh-fg)">
      </div>

      <div style="margin-bottom:1.5rem">
        <label for="id_password" style="display:block;font-weight:600;margin-bottom:0.3rem;font-size:0.875rem">Password</label>
        <input type="password" id="id_password" name="password" autocomplete="current-password"
               style="width:100%;padding:0.5rem 0.6rem;border:1px solid var(--lh-border-heavy);border-radius:4px;font-size:0.9rem;box-sizing:border-box;background:var(--lh-input-bg);color:var(--lh-fg)">
      </div>

      <input type="submit" value="Sign in" class="default" style="width:100%">
    </form>
  </div>
</div>
{% endblock %}

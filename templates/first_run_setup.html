<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkHop Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 24rem }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem }
    .sub { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem }
    label { display: block; font-weight: 600; margin-bottom: 0.25rem; font-size: 0.9rem }
    input { display: block; width: 100%; padding: 0.5rem 0.625rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem }
    input:focus { outline: none; border-color: #417690; box-shadow: 0 0 0 2px rgba(65,118,144,0.2) }
    button { width: 100%; padding: 0.6rem; background: #417690; color: #fff; border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer }
    button:hover { background: #356580 }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 0.5rem 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.875rem }
  </style>
</head>
<body>
  <div class="card">
    <h1>LinkHop Setup</h1>
    <p class="sub">Create the first admin account to get started.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" id="id_username" name="username" autofocus autocomplete="username" required>

      <label for="id_password">Password</label>
      <input type="password" id="id_password" name="password" autocomplete="new-password" required>

      <label for="id_password2">Confirm password</label>
      <input type="password" id="id_password2" name="password2" autocomplete="new-password" required>

      <button type="submit">Create admin account</button>
    </form>
  </div>
</body>
</html>

{% extends "base.html" %}
{% load static %}

{% block title %}Inbox — LinkHop{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem">
  <h1 style="margin:0">Inbox</h1>
  <div style="display:flex;align-items:baseline;gap:1rem">
    <button id="btn-ext" onclick="connectExtension()" style="background:none;border:none;cursor:pointer;font-size:0.75rem;color:#aaa;padding:0" title="Connect browser extension">🧩 extension</button>
    <a href="{% url 'debug' %}" style="font-size:0.75rem;color:#aaa;text-decoration:none">debug</a>
  </div>
</div>
<p id="ext-status" style="display:none;margin:-0.5rem 0 1rem;padding:0.4rem 0.75rem;border-radius:4px;font-size:0.875rem"></p>
<script>
function connectExtension() {
  window.postMessage({
    type: 'linkhop:connect_extension',
    payload: {
      token: '{{ device_token|escapejs }}',
      deviceId: '{{ device.id|escapejs }}',
      deviceName: '{{ device.name|escapejs }}',
      serverUrl: window.location.origin,
    },
  }, window.location.origin);
  var status = document.getElementById('ext-status');
  status.textContent = '✓ Extension connected! You can close the extension popup and reopen it.';
  status.style.background = '#d4edda';
  status.style.color = '#155724';
  status.style.display = 'block';
}
</script>

<div id="push-bar" style="display:none;margin-bottom:1.25rem;padding:0.6rem 0.875rem;background:#eef5ff;border:1px solid #c7dcff;border-radius:4px;font-size:0.875rem;gap:0.5rem;flex-direction:column">
  <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
    <span id="push-copy">Enable push notifications for this device?</span>
    <button id="push-btn" class="btn" style="padding:0.25rem 0.75rem;font-size:0.875rem">Enable Push</button>
    <button id="push-disable" style="display:none;background:none;border:none;cursor:pointer;color:#666;font-size:0.875rem;padding:0">Disable</button>
  </div>
  <div id="push-status" style="font-size:0.8rem;color:#4b5563;display:none"></div>
</div>

<div style="display:flex;gap:0.5rem;margin-bottom:1rem">
  <button id="filter-all" class="btn btn-sm" onclick="setFilter('all')" style="padding:0.25rem 0.75rem;font-size:0.8rem">All</button>
  <button id="filter-incoming" class="btn btn-sm" onclick="setFilter('incoming')" style="padding:0.25rem 0.75rem;font-size:0.8rem">Incoming</button>
  <button id="filter-sent" class="btn btn-sm" onclick="setFilter('sent')" style="padding:0.25rem 0.75rem;font-size:0.8rem">Sent</button>
  <button id="btn-clear" onclick="clearAll()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:0.75rem;color:#999;padding:0">Clear all</button>
</div>

<div id="message-list"></div>
<p id="empty-state" style="color:#666;display:none">No messages yet. Messages arrive via push notifications and are stored in this browser.</p>

<script src="{% static 'linkhop/push.js' %}"></script>
<script>
(function () {
  var token = "{{ device_token|escapejs }}";
  var deviceId = "{{ device.id|escapejs }}";
  var listEl = document.getElementById('message-list');
  var emptyEl = document.getElementById('empty-state');
  var currentFilter = 'all';
  var pushBar = document.getElementById('push-bar');
  var pushCopy = document.getElementById('push-copy');
  var pushBtn = document.getElementById('push-btn');
  var pushDisable = document.getElementById('push-disable');
  var pushStatus = document.getElementById('push-status');

  function setPushStatusText(text, isError) {
    if (!text) {
      pushStatus.style.display = 'none';
      pushStatus.textContent = '';
      return;
    }
    pushStatus.style.display = '';
    pushStatus.style.color = isError ? '#b91c1c' : '#4b5563';
    pushStatus.textContent = text;
  }

  function renderPushState(state) {
    if (!state.supported && !state.hint) {
      pushBar.style.display = 'none';
      return;
    }

    pushBar.style.display = 'flex';
    pushBtn.disabled = false;

    // Show install hint for iOS/Safari users who haven't installed as PWA
    if (!state.supported && state.hint) {
      pushCopy.textContent = state.hint;
      pushBtn.style.display = 'none';
      pushDisable.style.display = 'none';
      setPushStatusText('');
      return;
    }

    pushBtn.style.display = '';

    if (state.subscribed) {
      pushCopy.textContent = 'Push notifications are enabled.';
      pushBtn.textContent = 'Enabled';
      pushBtn.disabled = true;
      pushDisable.style.display = '';
      setPushStatusText(state.permission === 'granted' ? '' : 'Browser permission is not granted.', true);
      return;
    }

    pushDisable.style.display = 'none';
    pushBtn.textContent = 'Enable Push';

    if (state.permission === 'denied') {
      pushCopy.textContent = 'Browser notification permission is blocked.';
      setPushStatusText('Allow notifications in browser settings, then try again.', true);
      return;
    }

    pushCopy.textContent = 'Enable push notifications for this device?';
    setPushStatusText('');
  }

  function refreshPushState() {
    LinkHopPush.getState(renderPushState);
  }

  if (LinkHopPush.isSupported()) {
    LinkHopPush.syncAuthToken(token);
    refreshPushState();
  }

  pushBtn.addEventListener('click', function () {
    pushBtn.disabled = true;
    pushBtn.textContent = 'Working…';
    setPushStatusText('');
    LinkHopPush.enable(token, function (ok, message) {
      if (ok) {
        setPushStatusText('Push enabled!');
        refreshPushState();
        return;
      }
      setPushStatusText(message || 'Push setup failed.', true);
      refreshPushState();
    });
  });

  pushDisable.addEventListener('click', function () {
    setPushStatusText('Disabling…');
    LinkHopPush.disable(token, function (ok) {
      setPushStatusText(ok ? '' : 'Failed to disable push.', !ok);
      refreshPushState();
    });
  });

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatDate(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    if (isNaN(d.getTime())) return isoStr;
    return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
  }

  function truncate(text, max) {
    if (!text) return '';
    return text.length > max ? text.slice(0, max - 1) + '\u2026' : text;
  }

  function renderMessages(messages) {
    var filtered = messages.filter(function (m) {
      if (currentFilter === 'incoming') return m.direction === 'incoming';
      if (currentFilter === 'sent') return m.direction === 'sent';
      return true;
    });

    if (filtered.length === 0) {
      listEl.innerHTML = '';
      emptyEl.style.display = '';
      return;
    }

    emptyEl.style.display = 'none';
    var html = '<ul style="list-style:none;padding:0;margin:0">';

    filtered.forEach(function (msg) {
      var isUrl = msg.type === 'url';
      var dirLabel = msg.direction === 'sent' ? 'to' : 'from';
      var peerName = msg.direction === 'sent' ? (msg.recipient_name || 'device') : (msg.sender || 'unknown');
      var readStyle = msg.read ? 'opacity:0.6;' : '';
      var bodyDisplay = isUrl
        ? '<a href="' + escapeHtml(msg.body) + '" target="_blank" rel="noopener">' + escapeHtml(truncate(msg.body, 80)) + '</a>'
        : escapeHtml(truncate(msg.body, 120));
      var dirIcon = msg.direction === 'sent' ? '↑' : '↓';

      html += '<li style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:0.75rem 1rem;margin-bottom:0.75rem;' + readStyle + '">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:1rem;margin-bottom:0.375rem">' +
          '<span style="font-weight:600">' + dirIcon + ' ' + bodyDisplay + '</span>' +
          '<span style="font-size:0.75rem;white-space:nowrap;color:#555">' +
            '<button onclick="deleteMsg(\'' + msg.id + '\')" style="background:none;border:none;cursor:pointer;color:#999;font-size:0.75rem;padding:0" title="Delete">&times;</button>' +
          '</span>' +
        '</div>' +
        '<div style="font-size:0.8rem;color:#666">' +
          dirLabel + ' <strong>' + escapeHtml(peerName) + '</strong> &mdash; ' + escapeHtml(formatDate(msg.created_at)) +
        '</div>' +
      '</li>';
    });

    html += '</ul>';
    listEl.innerHTML = html;
  }

  function loadAndRender() {
    if (!navigator.serviceWorker || !navigator.serviceWorker.controller) {
      emptyEl.style.display = '';
      emptyEl.textContent = 'Service worker not ready. Refresh the page to try again.';
      return;
    }

    var channel = new MessageChannel();
    channel.port1.onmessage = function (e) {
      renderMessages(e.data.messages || []);
    };
    navigator.serviceWorker.controller.postMessage(
      { type: 'linkhop_get_messages' },
      [channel.port2]
    );
  }

  window.setFilter = function (f) {
    currentFilter = f;
    document.getElementById('filter-all').style.fontWeight = f === 'all' ? 'bold' : '';
    document.getElementById('filter-incoming').style.fontWeight = f === 'incoming' ? 'bold' : '';
    document.getElementById('filter-sent').style.fontWeight = f === 'sent' ? 'bold' : '';
    loadAndRender();
  };

  window.deleteMsg = function (id) {
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'linkhop_delete_message', id: id });
      setTimeout(loadAndRender, 100);
    }
  };

  window.clearAll = function () {
    if (!confirm('Clear all messages from this browser?')) return;
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'linkhop_clear_messages' });
      setTimeout(loadAndRender, 100);
    }
  };

  // Listen for new push messages to auto-refresh
  if (navigator.serviceWorker) {
    navigator.serviceWorker.addEventListener('message', function (e) {
      if (!e.data) return;
      if (e.data.type === 'linkhop_push_notified') {
        loadAndRender();
      }
      if (e.data.type === LinkHopPush.refreshEventName) {
        setPushStatusText('Push subscription changed. Refreshing…');
        LinkHopPush.enable(token, function (ok, message) {
          setPushStatusText(ok ? 'Push subscription refreshed.' : (message || 'Failed to refresh push.'), !ok);
          refreshPushState();
        });
      }
    });
  }

  // Initial filter state
  window.setFilter('all');

  // Reload from IDB on pageshow (back/forward navigation)
  window.addEventListener('pageshow', function (e) {
    if (e.persisted) loadAndRender();
  });
})();
</script>
{% endblock %}

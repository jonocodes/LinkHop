{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0066cc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="LinkHop">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="{% static 'linkhop/icons/icon-any.svg' %}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{% static 'linkhop/icons/icon-any.svg' %}">
  <title>{% block title %}LinkHop{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f5;
      margin: 0;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 1.5rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    input[type="text"],
    input[type="url"],
    select,
    textarea {
      display: block;
      width: 100%;
      padding: 0.5rem 0.625rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
      background: #fff;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid #0066cc;
      outline-offset: 1px;
      border-color: #0066cc;
    }

    textarea {
      resize: vertical;
      min-height: 8rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field-error {
      color: #c0392b;
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .btn {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover { background: #0055aa; }
    .btn:active { background: #004488; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 4px;
      margin-bottom: 1.25rem;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .device-hint {
      font-size: 0.8rem;
      color: #666;
      margin-left: 0.375rem;
    }

    .device-hint.online { color: #2e7d32; }
  </style>
</head>
<body>
  <div class="container">
    {% if device %}
    <nav style="display:flex;gap:1rem;align-items:baseline;margin-bottom:1.75rem;font-size:0.875rem;border-bottom:1px solid #ddd;padding-bottom:0.75rem">
      <a href="{% url 'inbox' %}" style="font-weight:600">Inbox</a>
      <a href="{% url 'send' %}">Send</a>
      <a href="{% url 'pair' %}">Pair</a>
      <span style="margin-left:auto;color:#666">{{ device.name }}</span>
      <a href="{% url 'disconnect' %}" style="color:#999">Forget this device</a>
    </nav>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
  <script src="{% static 'linkhop/pwa-register.js' %}"></script>
</body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "linkhop-lite/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: linkhop-lite
        run: bun install

      - name: Build
        working-directory: linkhop-lite
        env:
          VITE_BASE: /LinkHop/
        run: bun run build:web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: linkhop-lite/dist-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
